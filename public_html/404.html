<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Dissensus</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="images/diss-pfp.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .code { font-size: 6rem; font-weight: 700; background: linear-gradient(135deg, #8B5CF6, #00D4FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
        p { color: #A0A0B0; margin-bottom: 2rem; }
        a {
            display: inline-block;
            background: linear-gradient(135deg, #00FF88, #00D4FF);
            color: #0A0A0F;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.3s;
        }
        a:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="code">404</div>
